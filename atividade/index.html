<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
    
</head>
<body>

    <header>
        <h1>Formulário de Cadastro</h1>
    </header>

    <main>
        <form action="#" method="post">
            <!-- Text -->
            <label for="nome">Nome completo:</label>
            <input type="text" id="nome" name="nome" required>

            <!-- Email -->
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>

            <!-- Password -->
            <label for="senha">Senha:</label>
            <input type="password" id="senha" name="senha" required>

            <!-- Number -->
            <label for="idade">Idade:</label>
            <input type="number" id="idade" name="idade" min="1" max="120" required>

            <!-- Date -->
            <label for="nascimento">Data de Nascimento:</label>
            <input type="date" id="nascimento" name="nascimento" required>

            <label>Interesses:</label>
            <div class="checkbox-group">
                <label><input type="checkbox" name="interesses" value="musica"> Música</label>
                <label><input type="checkbox" name="interesses" value="esportes"> Esportes</label>
                <label><input type="checkbox" name="interesses" value="tecnologia"> Tecnologia</label>
            </div>

            <!-- Radio -->
            <label>Gênero:</label>
            <div class="radio-group">
                <label><input type="radio" name="genero" value="masculino" required> Masculino</label>
                <label><input type="radio" name="genero" value="feminino"> Feminino</label>
                <label><input type="radio" name="genero" value="outro"> Outro</label>
            </div>

            <!-- Textarea -->
            <label for="mensagem">Mensagem:</label>
            <textarea id="mensagem" name="mensagem" rows="4" placeholder="Escreva algo..."></textarea>

            <!-- Select -->
            <label for="estado">Estado:</label>
            <select id="estado" name="estado" required>
                <option value="">Selecione</option>
                <option value="sp">São Paulo</option>
                <option value="rj">Rio de Janeiro</option>
                <option value="mg">Minas Gerais</option>
                <option value="outro">Outro</option>
            </select>

            <button type="submit">Enviar</button>
        </form>
    </main>

    <footer>
        <p>
            https://github.com/gustavolimabrya-maker
        </p>
    </footer>

</body>
</html>
